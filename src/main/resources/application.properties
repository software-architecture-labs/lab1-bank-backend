# ================================================================
#  application.properties ? lab1banco
# ================================================================
#
#  PATRÓN ${VAR:valor_por_defecto}
#  Spring lee la variable de entorno VAR. Si no existe, usa el
#  valor por defecto que está después de los dos puntos.
#
#  Esto permite:
#  - En local: funciona sin configurar nada (usa los defaults)
#  - En Render: inyectas las variables reales desde el dashboard
#  - El mismo JAR/imagen sirve para ambos entornos
# ================================================================

spring.application.name=lab1banco

# ?? Conexión a PostgreSQL ??????????????????????????????????????
#
#  En local, si tienes PostgreSQL instalado:
#    crea la BD:  CREATE DATABASE lab1banco;
#    y deja el usuario/password como están abajo.
#
#  En Render, estas 3 variables se inyectan automáticamente
#  cuando conectas el servicio a la BD de Render (ver README).
#
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lab1banco}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ?? Hibernate ????????????????????????????????????????????????
#
#  update: crea las tablas si no existen y actualiza columnas
#  nuevas. Nunca borra datos. Es el modo correcto para un entorno
#  de laboratorio / demo.
#
#  IMPORTANTE: en producción real se usaría 'validate' + Flyway/Liquibase,
#  pero para el lab 'update' está bien.
#
spring.jpa.hibernate.ddl-auto=update

#  Spring Boot 3 auto-detecta el dialecto de PostgreSQL mirando
#  el driver en classpath. Esta línea es opcional pero la dejamos
#  explícita para que quede claro qué BD estamos usando.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#  Muestra el SQL generado en la consola (útil para debug).
#  Cámbialo a false si el log se vuelve muy ruidoso.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? Puerto (Render requiere 8080 por defecto) ?????????????????
server.port=${PORT:8080}
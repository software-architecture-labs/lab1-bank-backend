spring.application.name=lab1banco
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/lab1banco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Juanma87
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.media-types.json=application/json

# --- Configuraciˇn de Swagger ---

# Limpia cualquier error de coincidencia de rutas
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Configuraciˇn bßsica de OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Forzar a que Swagger use el formato JSON correctamente
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json